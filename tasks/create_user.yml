---

- name: "Add unix users {{ user['name'] }}"
  user:
    name: "{{ user['name'] }}"
    shell: "{{ user['shell']| default('/bin/bash')}}"
  tags:
    - users


- name: "Add ssh_key keys for user  {{ user['name'] }}"
  authorized_key:
    key: "{{ lookup('file', 'ssh_key/' + item) }}"
    user: "{{ user['name'] }}"
  with_items: "{{ user | authorized_keys }}"
  tags:
    - users


